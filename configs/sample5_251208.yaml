# Sample 5 (251208) end-to-end rmm2odt run.  *** SHAKEDOWN epochs ***
# Real geometry (n0=1.56, N=9 layers) but reduced epochs/iters to validate the
# full chain quickly on xclass. Scale up base_epochs/scan_epochs/n_epochs/n_iter
# for a quality reconstruction once this completes.
name: sample5_251208

optics:
  wavelength: 0.517
  NA: 1.0
  n0: 1.56
  resolution: 0.2581
  scan_step: 1.0

paths:
  rrmat: "/home/hoangku/data/experimental_data/517nm/251208/5/mat_40um_z14.3644_21.2779/rrmat.mat"
  illumination_file: "/home/hoangku/data/experimental_data/517nm/279x150x150_angle_illumination.mat"
  illumination_mat_key: angle_illumination
  output_root: "/home/hoangku/data/experimental_data/517nm/251208/5/mat_40um_z14.3644_21.2779/rmm2odt_run"

runtime:
  device: cuda

multilayer:
  init_dir: ""
  layer_positions: [100, 70, 50, 40, 30, 23, 14, 5, 0]
  scanning_layer_order: [8]          # sweep the sample plane (z=0, last layer)
  scanning_size: 150
  illumination_mode: speckle
  speckle: { s1_epochs: 2, steps_per_epoch: 50, proj_batch: 50, grad_clip_max_norm: 1.0, gpu_data: true }
  pupil_funcs_type: [variable, variable]
  optimization_hyperparams: { batch_size: 50, learning_rate: 0.02, gamma_coeff_1: 1.0, gamma_coeff_2: 0.0 }
  reg_mode: [L2_norm]
  base_epochs: 2
  scan_range: [-2, 3]                # 5 depths (shakedown)
  scan_step: 1
  scan_epochs: 2

gvas:
  grid: { Nx: 300, Ny: 300, Nz: 5, crop_size: 200 }
  extend_illumination: true
  use_scan_depths: true
  depths_center: 0.0
  optimisation: { n_epochs: 3, batch_size: 3, learning_rate: 0.05, loss_fn: MSE, reg_mode: L2, reg_weight: 0.01, save_crop_size: 150 }

odt:
  geom: { Nx: 150, Ny: 150, Nz: 150 }
  optim: { n_iter: 10, gamma: 1.0e-4, damping: 1.0, ang_num: 40, stochastic: true }
  reg:   { tau: 0.02, n_iter_tv: 5, n_upper: 1.7, n_lower: -0.01 }
  preprocess: { intensity_normalize: false, window: none }
  data_variant: illumination_output
  checkpoint_at: [10]

render:
  cmap: inferno
  scalebar_um: 10
  zscan_video: true
  panels:
    enable: true
    formats: [png, svg]
    fig4_z_um: [15, 20, 25]   # grayscale XY depths for fig4f_multi_depth_xy_odt_images
    fig4_cmap: gray
    crop_2d: 156              # matches the manuscript sample5 fig2d crop

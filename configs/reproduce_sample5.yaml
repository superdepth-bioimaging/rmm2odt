# Reproduce the sample5 (251208) paper figures with rmm2odt.
#
# This is the portable version of configs/sample5_251208_medium.yaml — the run
# that produced the published panels — with data paths driven by environment
# variables so a new user only has to point at their downloaded data:
#
#   export RMM2ODT_DATA=/absolute/path/to/downloaded/figshare/data
#   export RMM2ODT_OUT=/absolute/path/for/outputs      # optional; default ./results/sample5_251208
#
# The $RMM2ODT_DATA folder must contain the two Figshare files:
#   rrmat.mat                              (~4.74 GB, the reflection matrix)
#   279x150x150_angle_illumination.mat     (~50 MB, the GVAS illumination stack)
name: reproduce_sample5

optics:
  wavelength: 0.515          # µm (makes GVAS npix == resolution)
  NA: 1.0
  NA_model: 1.0
  n0: 1.56                   # medium refractive index
  resolution: 0.2581         # µm / pixel (lateral)
  scan_step: 1.0

paths:
  rrmat: "${RMM2ODT_DATA}/rrmat.mat"
  illumination_file: "${RMM2ODT_DATA}/279x150x150_angle_illumination.mat"
  illumination_mat_key: angle_illumination
  output_root: "${RMM2ODT_OUT:-./results/sample5_251208}"

runtime:
  device: cuda               # stages 1-3 need a CUDA GPU; set "cpu" only to smoke-test tiny configs

multilayer:
  init_dir: "${RMM2ODT_INIT_DIR:-}"   # empty = run base recon first; set to a
                                      # completed base dir to SKIP base and only
                                      # depth-scan from it (see run_from_scan.sh)
  layer_positions: [100, 70, 50, 40, 30, 14, 0]   # full 9-layer model (µm)
  scan_collapse_mode: center # >=2 in-window layers -> collapse to one swept object layer
  scanning_size: 156
  ROD: 150
  rrmat_spot_offset: [-1, -1]   
  complex_tensor_type: "${RMM2ODT_CTYPE:-Euler}"   # Euler default; set RMM2ODT_CTYPE=Rectangular to override
  geometry_mode: Reflection
  illumination_mode: speckle
  speckle: { s1_epochs: 10, steps_per_epoch: 100, proj_batch: 50, grad_clip_max_norm: 1.0, gpu_data: true }
  pupil_funcs_type: [variable, variable]
  optimization_hyperparams: { batch_size: 50, learning_rate: 0.02, gamma_coeff_1: 1.0, gamma_coeff_2: 1.0 }
  reg_mode: [L2_norm]
  base_epochs: 10
  scan_range: [5, 28]        # absolute z window (µm) -> object swept z=5..27 (23 depths)
  scan_step: 1
  scan_epochs: 5

gvas:
  grid: { Nx: 300, Ny: 300, Nz: 23, crop_size: 200 }   # CASS/model size; the 320 scan stack is centre-cropped to this
  extend_illumination: true
  use_scan_depths: false
  distance_range: [-9, 14]   # 23 frames <-> the 23 scan depths
  distance_step: 1
  optimisation: { n_epochs: 10, batch_size: 3, learning_rate: 0.05, loss_fn: MSE, reg_mode: L2, reg_weight: 0.01, save_crop_size: 180 }  # == odt.geom (180); must be <= crop_size (200) and >= odt.geom

odt:
  geom: { Nx: 180, Ny: 180, Nz: 180 }
  optim: { n_iter: 50, gamma: 1.0e-4, damping: 1.0, ang_num: 40, stochastic: true }
  reg:   { tau: 0.02, n_iter_tv: 5, n_upper: 1.7, n_lower: -0.01 }
  preprocess: { intensity_normalize: false, window: none }
  data_variant: illumination_output
  checkpoint_at: [10, 20, 30, 40, 50]

render:
  cmap: inferno
  scalebar_um: 10
  zscan_video: true
  fig_ortho: false                 # do not plot fig_ortho.png
  panels:
    enable: true
    formats: [png, svg]
    fig4_z_um: [15, 20, 25]        # TRUE sample depths (µm) for fig4f_multi_depth_xy_odt_images
    fig4_cmap: gray
    fig4_true_depth_focus_um: 14.0 # anchor labels to true depth: the swept object layer (dz=0)
                                   #   sits at z=14µm, mapped by BPM to volume slice Nz//2+1.
    fig4_vmin: 0.0                 # fig4f colormap range 0 .. 0.04
    fig4_vmax: 0.04
    fig4_outline_color: black      # per-depth frame colour (was red/green/blue)
    crop_2d: 156                   # sample-plane crop for fig2e_optimized_object
    # fig3d: 2 rows (illum phase + output phase), epoch-5 GVAS output, small angles.
    angle_indices: [0, 5, 15, 30, 45]  # 5 small illumination angles; col 1 = on-axis
    fig3d_show_output_amp: false       # drop the output |E| row
    fig3d_subtract_output_ramp: true   # subtract residual linear phase ramp on the Output-phase row
    fig3d_rrmat: false                 # drop the propagated-rrmat rows
    fig3d_odt_input: odt_input_epoch005.mat   # epoch-5 GVAS output (built from U_stack_epoch005)
